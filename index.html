<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f5ead8">
<title>Uncomfortable Calendar</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta property="og:type" content="website">
<meta property="og:title" content="Uncomfortable Calendar">
<meta property="og:description" content="One challenge a day. Spin the wheel and build your streak.">
<meta property="og:url" content="https://www.uncomfortablecalendar.com/">
<meta property="og:image" content="https://www.uncomfortablecalendar.com/icon-512.png">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="styles.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8922964802782980" crossorigin="anonymous"></script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2NY62NYQ8T"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-2NY62NYQ8T');
</script>
</head>
<body>
<div class="app-shell">

  <main id="screen-auth" class="screen auth-screen" hidden>
    <div class="auth-brand">
      <img class="brand-mark" src="/logo.svg" alt="" width="48" height="48">
      <div class="brand-line1">Uncomfortable</div>
      <div class="brand-line2">Calendar</div>
    </div>

    <div class="auth-card">
      <h2 id="authTitle" class="auth-title">Welcome back</h2>
      <p id="authSubtitle" class="auth-subtitle">Sign in to keep your streak going.</p>

      <div class="social-col" id="socialCol">
        <button class="social-btn" data-provider="google" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 009 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 013.68 9c0-.59.1-1.17.27-1.7V4.97H.96A9 9 0 000 9c0 1.45.35 2.83.96 4.03l2.99-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 00.96 4.97l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
          <span>Continue with Google</span>
        </button>
        <button class="social-btn" data-provider="facebook" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="9" fill="#1877F2"/><path fill="#fff" d="M12.1 9.35h-1.9V15h-2.4V9.35H6.4V7.2h1.4V5.86c0-1.4.83-2.36 2.46-2.36h1.6v2.1h-1c-.4 0-.56.24-.56.62V7.2h1.65l-.25 2.15z"/></svg>
          <span>Continue with Facebook</span>
        </button>
      </div>

      <div class="auth-divider" id="authDivider"><span>or</span></div>

      <form id="authForm" class="auth-form" autocomplete="on">
        <div class="field" id="nameField" hidden>
          <label for="authName">Name</label>
          <input class="input" id="authName" type="text" placeholder="Your name" autocomplete="name">
        </div>
        <div class="field">
          <label for="authEmail">Email</label>
          <input class="input" id="authEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="field" id="passwordField">
          <label for="authPassword">Password</label>
          <input class="input" id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password" minlength="4">
        </div>
        <div id="authError" class="auth-error" hidden></div>
        <button class="pill pill-accept auth-submit" type="submit" id="authSubmitBtn">Sign In</button>
      </form>

      <p class="auth-switch">
        <span id="authSwitchText">Don't have an account?</span>
        <button type="button" id="authSwitchBtn" class="link-btn">Sign up</button>
      </p>

      <p class="auth-switch">
        <button type="button" id="authBackBtn" class="link-btn">‹ Continue as Guest</button>
      </p>

      <p class="auth-footnote"><a href="/privacy.html">Privacy Policy</a></p>
    </div>
  </main>

  <div id="accountBar" class="account-bar" hidden>
    <div class="account-bar-left">
      <img class="header-logo" src="/logo.svg" alt="Uncomfortable Calendar" width="30" height="30">
      <button class="account-chip" id="accountChip" type="button">
        <span class="account-avatar" id="accountAvatar"></span>
        <span class="account-greeting" id="accountGreeting"></span>
      </button>
    </div>
    <button class="account-signout" id="signOutBtn" type="button">Sign out</button>
    <button class="pill pill-outline guest-signin-btn" id="guestSignInBtn" type="button" hidden>Sign Up / Log In</button>
  </div>

  <main id="screen-home" class="screen" hidden>
    <header class="home-header">
      <div class="brand">
        <div class="brand-line1">Uncomfortable</div>
        <div class="brand-line2">Calendar</div>
      </div>
      <div class="streak-box">
        <div class="streak-num-row">
          <svg id="streakFlame" class="streak-flame" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12.963 2.286a.75.75 0 00-1.071-.136 9.742 9.742 0 00-3.539 6.176 7.547 7.547 0 01-1.705-1.715.75.75 0 00-1.152-.082A9 9 0 1015.68 4.534a7.46 7.46 0 01-2.717-2.248zM15.75 14.25a3.75 3.75 0 11-7.313-1.172c.628.465 1.35.81 2.133 1a5.99 5.99 0 011.925-3.545 3.75 3.75 0 013.255 3.717z"/>
          </svg>
          <div id="streakNum" class="streak-num">0</div>
        </div>
        <div class="streak-label">day streak</div>
      </div>
    </header>

    <p id="coachLine" class="coach-line"></p>

    <div class="wheel-stage">
      <div id="wheelWrap" class="wheel-wrap">
        <div class="wheel-pointer"></div>
        <div id="wheel" class="wheel">
          <div id="wheelLabels" class="wheel-labels"></div>
        </div>
        <div class="wheel-hub"></div>
      </div>

      <button id="spinBtn" class="pill spin-btn" type="button">Spin the Wheel</button>

      <div id="resultCard" class="result-card-slot"></div>
    </div>

    <button type="button" id="guestStreakNote" class="guest-streak-note" hidden>Sign in to keep your streak</button>
  </main>

  <main id="screen-calendar" class="screen" hidden>
    <h2 id="calTitle" class="cal-title">Your Streak</h2>

    <div class="stat-row">
      <div class="stat-tile">
        <svg class="stat-icon accent" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12.963 2.286a.75.75 0 00-1.071-.136 9.742 9.742 0 00-3.539 6.176 7.547 7.547 0 01-1.705-1.715.75.75 0 00-1.152-.082A9 9 0 1015.68 4.534a7.46 7.46 0 01-2.717-2.248zM15.75 14.25a3.75 3.75 0 11-7.313-1.172c.628.465 1.35.81 2.133 1a5.99 5.99 0 011.925-3.545 3.75 3.75 0 013.255 3.717z"/>
        </svg>
        <div id="calStreak" class="stat-num accent">0</div>
        <div class="stat-label">current streak</div>
      </div>
      <div class="stat-tile">
        <svg class="stat-icon accent2" width="18" height="18" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M10 1.5l2.35 4.94 5.4.7-3.95 3.8.99 5.44L10 13.7l-4.79 2.68.99-5.44-3.95-3.8 5.4-.7z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
        <div id="calTotal" class="stat-num accent2">0</div>
        <div class="stat-label">total faced</div>
      </div>
    </div>

    <div class="cal-nav">
      <button id="prevMonth" class="nav-btn" type="button" aria-label="Previous month">
        <svg width="16" height="16" viewBox="0 0 16 16"><polyline points="10,3 5,8 10,13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div id="monthLabel" class="month-label"></div>
      <button id="nextMonth" class="nav-btn" type="button" aria-label="Next month">
        <svg width="16" height="16" viewBox="0 0 16 16"><polyline points="6,3 11,8 6,13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="weekday-row">
      <div class="weekday-cell">S</div><div class="weekday-cell">M</div><div class="weekday-cell">T</div><div class="weekday-cell">W</div><div class="weekday-cell">T</div><div class="weekday-cell">F</div><div class="weekday-cell">S</div>
    </div>
    <div id="calGrid" class="cal-grid"></div>
  </main>

  <div id="dayModal" class="day-modal-slot"></div>
  <div id="accountModal" class="day-modal-slot"></div>
  <div id="adModal" class="day-modal-slot"></div>
  <div id="spinLockModal" class="day-modal-slot"></div>
  <div id="welcomeGateModal" class="day-modal-slot"></div>
  <div id="shareModal" class="day-modal-slot"></div>

  <nav id="tabBar" class="tab-bar">
    <button id="tabHome" class="tab-btn" type="button">
      <svg width="20" height="20" viewBox="0 0 20 20">
        <path class="fill-part" d="M3 9.5L10 3.5L17 9.5V16.5C17 17.05 16.55 17.5 16 17.5H12.5V12.5H7.5V17.5H4C3.45 17.5 3 17.05 3 16.5V9.5Z" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
      <span>Home</span>
    </button>
    <button id="tabCalendar" class="tab-btn" type="button">
      <svg width="20" height="20" viewBox="0 0 20 20">
        <rect class="fill-part" x="3" y="4.5" width="14" height="12.5" rx="2" stroke-width="1.6"/>
        <line class="stroke-part" x1="3" y1="8" x2="17" y2="8" stroke-width="1.6"/>
        <line class="stroke-part" x1="6.5" y1="3" x2="6.5" y2="6" stroke-width="1.8" stroke-linecap="round"/>
        <line class="stroke-part" x1="13.5" y1="3" x2="13.5" y2="6" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Calendar</span>
    </button>
  </nav>

</div>
<script src="app.js"></script>
</body>
</html>
