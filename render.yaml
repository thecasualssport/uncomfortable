services:
  - type: web
    name: uncomfortable-challenge
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: uncomfortable-challenge-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /var/data/data.db
      - key: FRONTEND_URL
        value: https://www.uncomfortablecalendar.com/
      - key: GOOGLE_REDIRECT_URI
        value: https://www.uncomfortablecalendar.com/api/auth/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
